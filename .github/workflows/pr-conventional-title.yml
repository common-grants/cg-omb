name: "PR: Conventional Title"

# release-please derives version bumps from the squashed PR title, so it must be
# a valid conventional commit. Types must match release-please-config.json.

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            build
            chore
            ci
            test
          # Scopes are optional but, when present, must be one of these.
          scopes: |
            ts-plugin
            schemas
            website
          requireScope: false
          subjectPattern: ^[a-z].*[^.]$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}" must:
              - start with a lowercase letter
              - not end with a period
          wip: true
