name: "CD - TS Plugin: Publish to npm"

on:
  push:
    tags:
      - "@common-grants/cg-federal@*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or commit) to publish from"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@common-grants/cg-federal
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @common-grants/cg-federal run checks

      - run: pnpm --filter @common-grants/cg-federal run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @common-grants/cg-federal publish --provenance --access public --no-git-checks
